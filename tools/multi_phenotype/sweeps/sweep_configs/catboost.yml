program: genomen/tools/eval/sweeps/sweep_train.py
name: genomen_lightgbm_sweep
method: random
metric:
  name: test_pred_metric
  goal: maximize

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}
  - "--task_id=${envvar:TASK_ID}" 
  - "--model_type=${envvar:MODEL_TYPE}" 

parameters:
  # data set params
  max_samples_mult:
    values: [2.5]

  variant_sampling_strategy:
    values: ["random"]

  max_features:
    values: [70_000]

  # model params
  covar_model_name:
    value: "linear"

  geno_model_name:
    value: "catboost"

  geno_model_hyperparameters:
    parameters:
      catboost:
        parameters:
          iterations:
            distribution: int_uniform
            min: 1200
            max: 2000
          depth:
            distribution: int_uniform
            min: 6
            max: 10
          learning_rate:
            distribution: log_uniform_values
            min: 1.0e-2
            max: 0.2
          l2_leaf_reg:
            distribution: log_uniform_values
            min: 1.0
            max: 10.0
          bagging_temperature:
            distribution: uniform
            min: 0.0
            max: 1.0
          subsample:
            distribution: uniform
            min: 0.6
            max: 1.0
          random_strength:
            distribution: uniform
            min: 1.0
            max: 10.0
          grow_policy:
            values: ["Depthwise", "Lossguide"]
          bootstrap_type:
            values: ["Bayesian", "Bernoulli"]

  include_ss:
    values: [true]

  feature_selection_method:
    values: ["k_best"]

  aggregation_model_name:
    values: ["linear"]

  agg_mode:
    values: ["stacking"]

  filter_strat:
    values: ["positive"]

  p:
    values: [0.5, 0.6, 0.7]