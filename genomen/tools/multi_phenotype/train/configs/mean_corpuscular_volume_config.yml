---
DataSetConfig:
  phenotype_id: null
  classification: null
  file_format: "plink"
  populations: ["white_british"]
  include_x_chromosome: false
  maf_threshold: 0.05
  covar_config:
    include_covars: true
    covar_keys: ["age", "sex", "Global_PC1", "Global_PC2", "Global_PC3", "Global_PC4", "Global_PC5", "Global_PC6", "Global_PC7", "Global_PC8", "Global_PC9", "Global_PC10"]
  sample_sampling:
    strat: "random"
    max_samples: 120_000
    k: 2
    balance_pops: false
  variant_sampling:
    strat: "random"
    max_features: 80_000
    ld_config:
      prune_kb: 250
      prune_step: 50
      prune_r2: 0.1
      tau: 0.1
      ld_window_kb: 1_000
      ld_window: 50_000
      eps: 0.0
      eps_schedule: "constant"
      eps_step_size: 0.0
    gwas_config:
      path: "/private/groups/ioannidislab/dbonet/MetaPRS/gwas/ukb_step2_QT_allChrs_wCovars_INI30040.regenie" #"/private/groups/ioannidislab/cthoma13/data/genomen/gwas/GCST90043616_buildGRCh37.tsv"
      snps_column: "ID"
      pvalue_column: "p_value"
      sep: '\s+'
      nlogpvalue_column: "LOG10P"
      impute_val: 0.1
    window_overlap_ratio: 0.0
---
GenomenModelConfig:
  covar_config:
    covar_strat: null
    model_config:
      model_name: linear
      hyperparameters: {}
      balance_classes: false
  geno_config:
    n_estimators: 32
    compute_interactions: True
    preprocessing_config:
      z_score_thresh: 0.0
      standard_labels: false
      feature_selection:
        method: "k_best"  # Options: "none", "k_best", "percentile", "variance_threshold", "mutual_info", "rfe"
        k: 10_000
        percentile: 0.75
        variance_threshold: 0.05
        score_func: null
    model_config:
      model_name: ensemble
      ensemble_estimator_names: ["linear_l1", "linear_l2", "lightgbm", "catboost"]
      hyperparameters: 
        linear_l1:
          alpha: 0.01
        linear_l2:
          alpha: 0.01
        lightgbm:
          bagging_fraction: 0.5592635585660447
          bagging_freq: 1
          boosting_type: "gbdt"
          feature_fraction: 0.7836614993024709
          lambda_l2: 0.057188100503858155
          learning_rate: 0.019242059638336216
          max_depth: 13
          min_child_samples: 15
          min_child_weight: 6.771890736259132
          min_data_in_leaf: 269
          min_gain_to_split: 2.5222166401524806
          n_estimators: 1196
          num_leaves: 240
        catboost:
          bootstrap_type: "Bayesian"
          depth: 10
          iterations: 1852
          l2_leaf_reg: 2.8902861631063312
          learning_rate: 0.11498815288163476
          random_strength: 7.385160821841756
      balance_classes: true     
    aggregator_config:
      filter_strat: "top-p-percentile"
      agg_strat: "stacking"
      use_summary_stats: false
      model_config: 
        model_name: linear_l2
        hyperparameters: 
          alpha: 0.01
        balance_classes: false
      p: 0.7
      temp: 0.05
---
TrainConfig:
  batch_size: 2
  n_jobs: 28
  backend: "cpu"
  ram_mb: 100_000
  scorer: null
  patience: 10
  seed: 42
  log_with_wandb: true
  save_annotation: false
  save_model: false
