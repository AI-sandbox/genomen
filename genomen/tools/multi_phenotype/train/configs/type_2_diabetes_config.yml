---
DataSetConfig:
  phenotype_id: null
  classification: null
  file_format: "plink"
  populations: ["white_british"]
  include_x_chromosome: false
  maf_threshold: 0.05
  covar_config:
    include_covars: true
    covar_keys: ["age", "sex", "Global_PC1", "Global_PC2", "Global_PC3", "Global_PC4", "Global_PC5", "Global_PC6", "Global_PC7", "Global_PC8", "Global_PC9", "Global_PC10"]
  sample_sampling:
    strat: "balanced"
    max_samples: 120_000
    k: 2
    balance_pops: false
  variant_sampling:
    strat: "random"
    max_features: 80_000
    ld_config:
      prune_kb: 250
      prune_step: 50
      prune_r2: 0.1
      tau: 0.1
      ld_window_kb: 1_000
      ld_window: 50_000
      eps: 0.0
      eps_schedule: "constant"
      eps_step_size: 0.0
    gwas_config:
      path: "..."
      snps_column: "ID"
      pvalue_column: "p_value"
      sep: '\s+'
      nlogpvalue_column: "LOG10P"
      impute_val: 0.1
    window_overlap_ratio: 0.0
---
GenomenModelConfig:
  covar_config:
    covar_strat: null
    model_config:
      model_name: linear
      hyperparameters: {}
      balance_classes: false
  geno_config:
    n_estimators: 32
    compute_interactions: True
    preprocessing_config:
      z_score_thresh: 0.0
      standard_labels: false
      feature_selection:
        method: "k_best"  # Options: "none", "k_best", "percentile", "variance_threshold", "mutual_info", "rfe"
        k: 15_000
        percentile: 0.75
        variance_threshold: 0.05
        score_func: null
    model_config:
      model_name: ensemble
      ensemble_estimator_names: ["linear_l1", "linear_l2", "lightgbm", "xgboost", "catboost"]
      hyperparameters: 
        linear_l1:
          alpha: 0.01
        linear_l2:
          alpha: 0.01
        lightgbm:
          bagging_fraction: 0.6921941641133147
          bagging_freq: 1
          boosting_type: "gbdt"
          feature_fraction: 0.7503262601343743
          lambda_l2: 0.0015779592163740377
          learning_rate: 0.01015848231772904
          max_depth: 17
          min_child_samples: 18
          min_child_weight: 3.318420703047919
          min_data_in_leaf: 295
          min_gain_to_split: 1.3466169106760264
          n_estimators: 1041
          num_leaves: 408
        xgboost:
          booster: "gbtree"
          colsample_bytree: 0.739267717787961
          learning_rate: 0.19091845460600643
          max_depth: 10
          n_estimators: 1697
          reg_alpha: 0.005068831977910931
          reg_lambda: 0.10949463766280808
          subsample: 0.6241737128509045
          tree_method: "hist"
        catboost:
          bootstrap_type: "Bernoulli"
          depth: 6
          iterations: 1527
          l2_leaf_reg: 1.0963053950286965
          learning_rate: 0.1686564360357446
          random_strength: 1.360180758054268
      balance_classes: true     
    aggregator_config:
      filter_strat: "geq-average"
      agg_strat: "mean"
      use_summary_stats: false
      model_config: 
        model_name: linear_l2
        hyperparameters: 
          alpha: 0.01
        balance_classes: true
      p: 0.7
      temp: 0.05
---
TrainConfig:
  batch_size: 2
  n_jobs: 28
  backend: "cpu"
  ram_mb: 100_000
  scorer: null
  patience: 10
  seed: 42
  log_with_wandb: true
  save_annotation: false
  save_model: false
