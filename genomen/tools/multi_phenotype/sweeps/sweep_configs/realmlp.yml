program: genomen/tools/eval/sweeps/sweep_train.py
name: genomen_realmlp_sweep
method: random
metric:
  name: test_pred_metric
  goal: maximize

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}
  - "--task_id=${envvar:TASK_ID}"
  - "--model_type=${envvar:MODEL_TYPE}"

parameters:
  # data set params
  max_samples_mult:
    values: [2, 4, 8, "max"]

  strat_sampling_ratio_multiplier:
    parameters:
      low:
        values: [1.0, 5.0, 10.0, 20.0]
      medium:
        values: [0.5, 1.0, 1.5, 2.5]
      high:
        values: [0.5, 1.0, 1.2]

  variant_sampling_strategy:
    value: "random"

  max_features:
    values: [5000, 10000, 25000, 40000]

  # model params
  covar_model_name:
    value: "linear"
  
  geno_model_name:
    value: "realmlp"

  geno_model_hyperparameters:
    parameters:
      realmlp:
        parameters:
          num_emb_type:
            values: ["none", "pbld", "pl", "plr"]
          add_front_scale:
            values: [True, False]
          lr:
            distribution: log_uniform_values
            min: 2.0e-2
            max: 3.0e-1
          p_drop:
            values: [0.0, 0.15, 0.3]
          wd:
            values: [0.0, 0.02]
          plr_sigma:
            distribution: log_uniform_values
            min: 0.05
            max: 0.5
          act:
            values: ["relu", "selu", "mish"]
          hidden_sizes:
            values:
              - [256, 256, 256]
              - [64, 64, 64, 64, 64]
              - [512]
          ls_eps:
            values: [0.0, 0.1]

  aggregation_model_name:
    value: "linear"

  filter_strat:
    values: ["none", "positive", "geq-average", "top-p-percentile"]
  
  p:
    values: [0.4, 0.5, 0.6, 0.7, 0.8]