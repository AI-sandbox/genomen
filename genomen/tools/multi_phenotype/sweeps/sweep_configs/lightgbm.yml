program: genomen/tools/eval/sweeps/sweep_train.py
name: genomen_lightgbm_sweep
method: random
metric:
  name: test_pred_metric
  goal: maximize

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}
  - "--task_id=${envvar:TASK_ID}" 
  - "--model_type=${envvar:MODEL_TYPE}" 

parameters:
  # data set params
  max_samples_mult:
    values: [4]

  variant_sampling_strategy:
    values: ["LD"]

  max_features:
    values: [40_000]

  # model params
  covar_model_name:
    value: "linear"

  geno_model_name:
    value: "lightgbm"

  geno_model_hyperparameters:
    parameters:
      lightgbm:
        parameters:
          n_estimators:
            values: [1500]
            #distribution: int_uniform
            #min: 1200
            #max: 2000
          num_leaves:
            values: [400]
            #distribution: int_uniform
            #min: 300
            #max: 800
          reg_lambda:
            values: [0.5]
            #distribution: log_uniform_values
            #min: 1.0e-3
            #max: 200.0
          min_data_in_leaf:
            values: [200]
            #distribution: int_uniform
            #min: 150
            #max: 300
          max_depth:
            values: [15]
            #distribution: int_uniform
            #min: 10
            #max: 20
          min_gain_to_split:
            values: [0.1]
            #distribution: log_uniform_values
            #min: 0.1
            #max: 2.0
          min_child_samples:
            values: [5.0]
            #distribution: log_uniform_values
            #min: 5.0
            #max: 20.0
          learning_rate:
            values: [0.2]
            #distribution: log_uniform_values
            #min: 1.0e-2
            #max: 0.4
          bagging_fraction:
            values: [0.6]
            #distribution: uniform
            #min: 0.5
            #max: 0.95 
          bagging_freq:
            values: [1]
          boosting_type:
            values: ["gbdt"]

  include_ss:
    values: [true]

  feature_selection_method:
    values: ["k_best"]

  aggregation_model_name:
    values: ["linear"]

  agg_mode:
    values: ["stacking"]

  filter_strat:
    values: ["positive"]

  p:
    values: [0.6]

  eps:
    distribution: uniform
    min: 0.0
    max: 0.5