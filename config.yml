---
DataSetConfig:
  phenotype_id: "HC1584"
  classification: true
  file_format: "plink"
  populations: ["white_british"]
  include_x_chromosome: false
  maf_threshold: 0.05
  sex: null
  covar_config:
    include_covars: true
    covar_keys: ["age", "sex", "Global_PC1", "Global_PC2", "Global_PC3", "Global_PC4", "Global_PC5", "Global_PC6", "Global_PC7", "Global_PC8", "Global_PC9", "Global_PC10"]
  sample_sampling:
    strat: "balanced"
    max_samples: 1_000
    k: 5
    balance_pops: false
  variant_sampling:
    strat: "random"
    max_features: 1_000
    ld_config:
      prune_kb: 250
      prune_step: 50
      prune_r2: 0.1
      tau: 0.1
      ld_window_kb: 1_000
      ld_window: 50_000
      eps: 0.0
      eps_schedule: "constant"
      eps_step_size: 0.0
    gwas_config:
      path: "results/x_comparison/gwas/male_pattern_baldness/Hagenaars2017_UKB_MPB_summary_results_10Feb2016.txt" #"/private/groups/ioannidislab/genomen-data/gwas/ovarian_cancer.tsv"
      snps_column: "Markername"
      pvalue_column: "P-value"
    window_overlap_ratio: 0.5
---
GenomenModelConfig:
  covar_config:
    covar_strat: "residualization"
    model_config:
      model_name: linear
      hyperparameters: {}
      balance_classes: false
  geno_config:
    n_estimators: 16
    compute_interactions: False
    preprocessing_config:
      z_score_thresh: 0.0
      standard_labels: false
      feature_selection:
        method: "k_best"  # Options: "none", "k_best", "percentile", "variance_threshold", "mutual_info", "rfe"
        k: 1_000
        percentile: 0.75
        variance_threshold: 0.05
        score_func: null
    model_config:
      model_name: "lightgbm"
      ensemble_estimator_names: ["linear_l1", "linear_l2", "lightgbm"]
      hyperparameters: 
        bagging_fraction: 0.8826044039166044
        bagging_freq: 1
        boosting_type: "gbdt"
        feature_fraction: 0.6632621113216656
        lambda_l2: 6.343992964036544
        learning_rate: 0.015598261217595976
        max_depth: 13
        min_child_samples: 14
        min_child_weight: 4.820015714285139
        min_data_in_leaf: 290
        min_gain_to_split: 2.827274924720608
        n_estimators: 1595
        num_leaves: 296
      balance_classes: true     
    aggregator_config:
      filter_strat: "geq-average"
      agg_strat: "stacking"
      use_summary_stats: false
      model_config: 
        model_name: linear_l2
        hyperparameters: 
          alpha: 0.01
        balance_classes: true
      p: 0.7
      temp: 0.05
---
TrainConfig:
  batch_size: 2
  n_jobs: 28
  backend: "cpu"
  ram_mb: 100_000
  scorer: "rocauc"
  patience: 10
  seed: 42
  log_with_wandb: false
  save_annotation: false
  save_model: false
  compute_shap: false