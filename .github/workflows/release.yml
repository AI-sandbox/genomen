name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Install uv
      uses: astral-sh/setup-uv@v6
    - name: Install Python
      run: uv python install
    - name: Build
      run: uv build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  pypi:
    name: PyPI release
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/genomen/
    permissions:
      id-token: write

    steps:
    - name: Retrieve dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  github:
    name: GitHub archive upload
    needs:
    - build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Retrieve dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Upload dists
      run: |
        gh release upload ${{ github.ref_name }} $(find . -iname genomen*.whl)
        gh release upload ${{ github.ref_name }} $(find . -iname genomen*.tar.gz)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}